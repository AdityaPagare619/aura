# Cross-compilation targets for AURA v4
# Primary target: aarch64-linux-android (Termux on ARM64 devices)
#
# Uses $ANDROID_NDK_HOME env var — set this to your NDK root (e.g. r26b).
# CI sets these via workflow env vars; local builds need ANDROID_NDK_HOME.
# API level 26 matches minSdk (Android 8.0+).

[target.aarch64-linux-android]
linker = "aarch64-linux-android26-clang"
ar = "llvm-ar"
