# Cross-compilation targets for AURA v4
# Primary target: aarch64-linux-android (Termux on ARM64 devices)
#
# These are defaults used by `cargo build --target aarch64-linux-android`.
# The NDK toolchain path must be in PATH, or set CARGO_TARGET_*_LINKER
# in the environment (CI sets these via workflow env vars).

[target.aarch64-linux-android]
linker = "aarch64-linux-android21-clang"
ar = "llvm-ar"
