name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
          
      - name: Setup Android NDK
        uses: android-actions/setup-android@v2
        with:
          ndk-version: r27d
          
      - name: Build Release
        env:
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/windows-x86_64/bin/aarch64-linux-android21-clang
        run: |
          cargo build --release --target aarch64-linux-android -p aura-neocortex
          cargo build --release --target aarch64-linux-android -p aura-daemon
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-android-arm64
          path: |
            target/aarch64-linux-android/release/aura-neocortex
            target/aarch64-linux-android/release/aura-daemon
