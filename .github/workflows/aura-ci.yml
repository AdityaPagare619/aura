# ============================================================
# AURA v4 — CI Workflow
# Lint → Build Matrix (aarch64-linux-android + x86_64-linux) → Test
#
# TOOLCHAIN: stable
# NDK: r26b, API level 26
# TARGETS: aarch64-linux-android, x86_64-unknown-linux-gnu
# ============================================================

name: AURA CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: aura-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: full
  NDK_VERSION: r26b
  NDK_SHA256: ad73c0370f0b0a87d1671ed2fd5a9ac9acfd1eb5c43a7fbfbd330f85d19dd632
  API_LEVEL: "26"

jobs:
  # ============================================================
  # LINT — clippy + rustfmt
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (stable + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libopus-dev

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --workspace --features "aura-llama-sys/stub,aura-daemon/reqwest" -- -D warnings

  # ============================================================
  # BUILD — Multi-target matrix (Android + Linux)
  # ============================================================
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-android
          - x86_64-unknown-linux-gnu
        include:
          # ── aarch64-linux-android (primary) ──
          - target: aarch64-linux-android
            features: "aura-llama-sys/stub,aura-daemon/curl-backend"
            needs_ndk: true

          # ── x86_64-unknown-linux-gnu (desktop testing) ──
          - target: x86_64-unknown-linux-gnu
            features: "aura-llama-sys/stub,aura-daemon/curl-backend"
            needs_ndk: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (stable + ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── NDK setup (Android targets only) ──
      - name: Download Android NDK r26b
        if: matrix.needs_ndk
        run: |
          curl -fsSL -o ndk.zip "https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip"
          echo "${{ env.NDK_SHA256 }}  ndk.zip" | sha256sum -c || exit 1
          unzip -q ndk.zip -d "$HOME"
          rm -f ndk.zip
          echo "NDK_HOME=$HOME/android-ndk-${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"

      - name: Set NDK toolchain env
        if: matrix.needs_ndk
        run: |
          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${TOOLCHAIN}/aarch64-linux-android${{ env.API_LEVEL }}-clang" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android${{ env.API_LEVEL }}-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=${TOOLCHAIN}/llvm-ar" >> "$GITHUB_ENV"
          echo "$TOOLCHAIN" >> "$GITHUB_PATH"

      # ── Common steps ──
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ matrix.target }}

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libopus-dev

      - name: Build aura-daemon
        run: |
          cargo build --release \
            --bin aura-daemon \
            --features "${{ matrix.features }}" \
            --target ${{ matrix.target }}

      - name: Build aura-neocortex
        run: |
          cargo build --release \
            --bin aura-neocortex \
            --features "aura-llama-sys/stub" \
            --target ${{ matrix.target }} \
            || echo "aura-neocortex build failed, continuing..."

      - name: Verify artifacts
        run: |
          echo "=== Artifacts (${{ matrix.target }}) ==="
          ls -lh target/${{ matrix.target }}/release/aura-daemon 2>/dev/null && echo "aura-daemon: OK" || echo "aura-daemon: MISSING"
          ls -lh target/${{ matrix.target }}/release/aura-neocortex 2>/dev/null && echo "aura-neocortex: OK" || echo "aura-neocortex: MISSING"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aura-${{ matrix.target }}-${{ github.sha }}
          path: |
            target/${{ matrix.target }}/release/aura-daemon
            target/${{ matrix.target }}/release/aura-neocortex
          retention-days: 30

  # ============================================================
  # TEST — Unit tests on host (Linux)
  # ============================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libopus-dev

      - name: Run tests
        run: cargo test --workspace --features "aura-llama-sys/stub,aura-daemon/reqwest"
        env:
          RUST_LOG: debug
