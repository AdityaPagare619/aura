# ============================================================
# AURA v4 — Android Cross-Compilation
# Target: aarch64-linux-android (Termux on ARM64 devices)
# NDK: r26b (stable LTS)
#
# TOOLCHAIN: Must match rust-toolchain.toml (nightly-2026-03-01)
# SECURITY:  NDK download verified with SHA256 checksum
#            All third-party actions pinned to commit SHA
# ============================================================

name: Build Android

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: r26b
  # Official SHA256 for android-ndk-r26b-linux.zip (source: Google / conan-center-index)
  NDK_SHA256: "ad73c0370f0b0a87d1671ed2fd5a9ac9acfd1eb5c43a7fbfbd330f85d19dd632"
  # API level 26 = Android 8.0 minimum — matches minSdk 26 in build.gradle
  API_LEVEL: "26"
  TARGET: aarch64-linux-android

jobs:
  build-android:
    name: Cross-compile aura-daemon (aarch64-linux-android)
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------
      # 1. Checkout — recursive for llama.cpp submodule
      # ----------------------------------------------------------
      - name: Checkout (with submodules)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      # ----------------------------------------------------------
      # 2. Rust toolchain + Android target (matches rust-toolchain.toml)
      # ----------------------------------------------------------
      - name: Install Rust (stable) + aarch64-linux-android target
        # CHANGED: nightly-2026-03-01 → stable (F001 fix: NDK #2073 — panic=abort+LTO crashes)
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          targets: aarch64-linux-android

      # ----------------------------------------------------------
      # 3. Cache
      # ----------------------------------------------------------
      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: android-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: android-cargo-

      # ----------------------------------------------------------
      # 4. Cache and download Android NDK r26b with integrity check
      # ----------------------------------------------------------
      - name: Cache Android NDK
        id: ndk-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/android-ndk-${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}-linux-${{ env.NDK_SHA256 }}

      - name: Download and verify Android NDK r26b
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          NDK_URL="https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
          echo "Downloading NDK from: $NDK_URL"
          curl -fsSL "$NDK_URL" -o ndk.zip

          echo "Verifying NDK SHA256 checksum..."
          ACTUAL_SHA256=$(sha256sum ndk.zip | cut -d' ' -f1)
          if [ "$ACTUAL_SHA256" != "$NDK_SHA256" ]; then
            echo "FATAL: NDK checksum mismatch!"
            echo "Expected: $NDK_SHA256"
            echo "Actual:   $ACTUAL_SHA256"
            echo "This could indicate a supply-chain attack or corrupted download."
            rm -f ndk.zip
            exit 1
          fi
          echo "NDK checksum verified: $ACTUAL_SHA256"

          unzip -q ndk.zip -d $HOME
          rm -f ndk.zip

      - name: Set NDK environment
        run: echo "NDK_HOME=$HOME/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      # ----------------------------------------------------------
      # 5. Export cross-compilation environment variables
      # These tell cc-rs and cargo which toolchain binaries to use
      # ----------------------------------------------------------
      - name: Configure cross-compilation env
        run: |
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOST_TAG=linux-x86_64" >> $GITHUB_ENV

          # Clang binaries for API level 21
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=${TOOLCHAIN}/llvm-ar" >> $GITHUB_ENV

          # Provide explicit native search roots for rustc final link step.
          # This prevents "could not find native static library c++_static"
          # when build.rs requests static libc++ for Android artifacts.
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_RUSTFLAGS=-L native=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib -L native=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android -L native=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/${API_LEVEL}" >> $GITHUB_ENV

          # Add NDK bin to PATH so cc-rs can find tools without full paths
          echo "${TOOLCHAIN}" >> $GITHUB_PATH

      # ----------------------------------------------------------
      # 6. System build deps (cmake needed by llama.cpp build.rs)
      # ----------------------------------------------------------
      - name: Install system build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config

      # ----------------------------------------------------------
      # 7. Verify submodule (fail fast with a clear message)
      # ----------------------------------------------------------
      - name: Verify llama.cpp submodule is present
        run: |
          if [ ! -f "crates/aura-llama-sys/llama.cpp/llama.cpp" ]; then
            echo "ERROR: crates/aura-llama-sys/llama.cpp submodule is missing or empty."
            echo "The aura-llama-sys build.rs compiles llama.cpp from source for Android."
            echo "Fix: commit the llama.cpp submodule at crates/aura-llama-sys/llama.cpp"
            exit 1
          fi
          echo "llama.cpp submodule verified OK"

      # ----------------------------------------------------------
      # 8. Cross-compile: cdylib (libaura_daemon.so) + neocortex binary
      # NOTE: We build --lib for aura-daemon to produce the cdylib only.
      # The [[bin]] target is NOT built here because it would pull in
      # voice FFI symbols that require native libs not available during
      # cross-compilation. The daemon binary for Termux is built in the
      # release workflow with voice feature disabled.
      # ----------------------------------------------------------
      - name: Build aura-daemon cdylib (libaura_daemon.so)
        run: cargo build --release --lib -p aura-daemon --target aarch64-linux-android

      - name: Build aura-neocortex binary
        run: cargo build --release -p aura-neocortex --target aarch64-linux-android

      # ----------------------------------------------------------
      # 9. Strip binaries (reduces size significantly for on-device use)
      # ----------------------------------------------------------
      - name: Strip binaries
        run: |
          STRIP="$TOOLCHAIN/llvm-strip"
          # Strip the cdylib
          CDYLIB="target/aarch64-linux-android/release/libaura_daemon.so"
          if [ -f "$CDYLIB" ]; then
            echo "Stripping libaura_daemon.so: $(du -sh $CDYLIB | cut -f1) before"
            $STRIP "$CDYLIB"
            echo "Stripped libaura_daemon.so: $(du -sh $CDYLIB | cut -f1) after"
          fi
          # Strip neocortex binary
          NEO="target/aarch64-linux-android/release/aura-neocortex"
          if [ -f "$NEO" ]; then
            echo "Stripping aura-neocortex: $(du -sh $NEO | cut -f1) before"
            $STRIP "$NEO"
            echo "Stripped aura-neocortex: $(du -sh $NEO | cut -f1) after"
          fi

      - name: Verify Android runtime dependencies
        run: |
          set -euo pipefail

          READELF="$TOOLCHAIN/llvm-readelf"
          if [ ! -x "$READELF" ]; then
            echo "ERROR: llvm-readelf not found at $READELF"
            exit 1
          fi

          inspect_needed() {
            local bin="$1"
            echo "Inspecting dynamic deps for: $bin"
            "$READELF" -d "$bin" | awk '/NEEDED/ {print "  "$0}' || true
          }

          assert_no_libcpp_shared() {
            local bin="$1"
            local needed
            needed="$($READELF -d "$bin" | awk '/NEEDED/ {print $5}' | tr -d '[]' || true)"
            if printf '%s\n' "$needed" | grep -Fqx 'libc++_shared.so'; then
              echo "ERROR: $bin depends on libc++_shared.so"
              echo "This breaks Termux runtime on devices without that shared library."
              exit 1
            fi
          }

          inspect_needed "target/aarch64-linux-android/release/libaura_daemon.so"
          inspect_needed "target/aarch64-linux-android/release/aura-neocortex"

          # Enforce self-contained neocortex binary for real-device reliability.
          assert_no_libcpp_shared "target/aarch64-linux-android/release/aura-neocortex"

      # ----------------------------------------------------------
      # 10. Upload artifacts
      # ----------------------------------------------------------
      - name: Upload binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: aura-binaries-aarch64-linux-android
          path: |
            target/aarch64-linux-android/release/libaura_daemon.so
            target/aarch64-linux-android/release/aura-neocortex
          retention-days: 30
          if-no-files-found: error
