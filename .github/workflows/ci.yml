# ============================================================
# AURA v4 — CI Pipeline v2
# 6-Stage Pipeline for Cross-Compilation and Device Testing
#
# STAGE 1: SOURCE — Checkout, cache, env detection
# STAGE 2: BUILD  — Cross-compile for ARM64 (Android)
# STAGE 3: INSPECT — Verify artifact architecture
# STAGE 4: TEST   — Unit tests + lint (Linux)
# STAGE 5: DEPLOY — Upload artifact
# STAGE 6: DEVICE — Execute on device (device-validate.yml)
#
# TOOLCHAIN: stable (was nightly-2026-03-01 — F001 fix: NDK #2073)
# ============================================================

name: CI Pipeline v2

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: full

jobs:
  # ============================================================
  # STAGE 1: SOURCE — Checkout, cache, env detection
  # ============================================================
  source:
    name: Source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Detect environment
        run: |
          echo "HOST=$(uname -s)"
          echo "ARCH=$(uname -m)"
          echo "TARGET=aarch64-linux-android"
          echo "RUSTC=$(rustc --version)"
          echo "CARGO=$(cargo --version)"

  # ============================================================
  # STAGE 2: BUILD — Cross-compile for ARM64 (Android)
  # ============================================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: Download Android NDK r26b
        run: |
          curl -fsSL -o ndk.zip "https://dl.google.com/android/repository/android-ndk-r26b-linux.zip"
          echo "${NDK_SHA256}  ndk.zip" | sha256sum -c || exit 1
          unzip -q ndk.zip -d $HOME
          rm -f ndk.zip
          echo "NDK_HOME=$HOME/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
        env:
          NDK_VERSION: r26b
          NDK_SHA256: ad73c0370f0b0a87d1671ed2fd5a9ac9acfd1eb5c43a7fbfbd330f85d19dd632

      - name: Set NDK environment
        run: |
          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${TOOLCHAIN}/aarch64-linux-android34-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android34-clang" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=${TOOLCHAIN}/llvm-ar" >> $GITHUB_ENV

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libopus-dev

      # STAGE 2: BUILD — Cross-compile aura-daemon for Android ARM64
      # curl-backend feature: use curl subprocess for HTTP (Termux-compatible, no TLS library deps)
      # stub feature: skip llama.cpp FFI (no NDK for llama.cpp)
      # NDK: Required for ring (cryptography crate) C compilation
      # NOTE: reqwest PANICS on Termux (rustls-platform-verifier needs JVM). Use curl-backend.
      - name: Build aura-daemon (Android ARM64)
        run: |
          cargo build \
            --release \
            --bin aura-daemon \
            --features "stub,curl-backend" \
            --target aarch64-linux-android

      - name: Build aura-cli (Android ARM64)
        run: |
          cargo build \
            --release \
            --bin aura-cli \
            --target aarch64-linux-android \
            --manifest-path crates/aura-cli/Cargo.toml \
            || echo "aura-cli build failed, continuing..."

      # ============================================================
      # STAGE 3: INSPECT — Verify artifact exists
      # ============================================================
      - name: Verify artifact exists
        run: |
          echo "=== Checking aura-daemon artifact ==="
          echo "Files in target/release:"
          ls -la target/release/ 2>/dev/null || echo "No target/release"
          echo "Files in targets/aarch64-linux-android/release:"
          ls -la targets/aarch64-linux-android/release/ 2>/dev/null || echo "No targets/aarch64-linux-android/release"
          echo "=== Done ==="

      # ============================================================
      # STAGE 5: DEPLOY — Upload artifact
      # ============================================================
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: aura-daemon-android-v2
          path: |
            target/aarch64-linux-android/release/aura-daemon
            target/aarch64-linux-android/release/aura-cli
          retention-days: 30

  # ============================================================
  # STAGE 4: TEST — Unit tests + lint (Linux)
  # ============================================================
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libopus-dev

      - run: cargo check --workspace --features "aura-llama-sys/stub,aura-daemon/voice,aura-daemon/reqwest"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libopus-dev

      - run: cargo test --workspace --features "aura-llama-sys/stub,aura-daemon/voice,aura-daemon/reqwest"
        env:
          RUST_LOG: debug

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Rust (stable) + clippy
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libopus-dev

      - run: cargo clippy --workspace --features "aura-llama-sys/stub,aura-daemon/voice,aura-daemon/reqwest" -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Rust (stable) + rustfmt
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          components: rustfmt

      - run: cargo fmt --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: |
          cargo audit --ignore RUSTSEC-2025-0141

  version-check:
    name: Version Tag Check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate version tag matches Cargo.toml
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "Git tag version:   $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch! Tag v${TAG_VERSION} does not match Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi
          echo "Versions match."
