# ============================================================
# AURA v4 — CI Pipeline
# Runs on every push and PR to main
# All jobs run in parallel — fast feedback, no serialization
# ============================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # --------------------------------------------------------
  # Job 1: cargo check — fast compilation gate
  # --------------------------------------------------------
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config

      # stub feature skips llama.cpp compilation on Linux CI hosts (no NDK available)
      - run: cargo check --workspace --features stub

  # --------------------------------------------------------
  # Job 2: cargo test (aura-daemon only — host-compatible)
  # --------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config

      # aura-llama-sys uses stub mode on non-Android hosts (llama_stub cfg)
      # so testing the full workspace is safe; llama.cpp submodule not needed
      - run: cargo test -p aura-daemon
        env:
          RUST_LOG: debug

  # --------------------------------------------------------
  # Job 3: clippy — warnings as errors
  # --------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config

      # stub feature skips llama.cpp compilation on Linux CI hosts (no NDK available)
      - run: cargo clippy --workspace --features stub -- -D warnings

  # --------------------------------------------------------
  # Job 4: rustfmt — enforce consistent formatting
  # --------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt --check
