name: Build Dev Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/.devcontainer/Dockerfile.termux-like'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infrastructure/.devcontainer/Dockerfile.termux-like
          push: true
          tags: ghcr.io/adityapagare619/aura-termux-dev:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image URL
        run: echo "Image pushed to ghcr.io/adityapagare619/aura-termux-dev:latest"