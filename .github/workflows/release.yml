# ============================================================
# AURA v4 — Release Management Pipeline
# Semantic versioning, auto-changelog, multi-platform builds,
# GitHub release with checksums, pre-release/stable channels
#
# NDK: r26b (consistent with all CI workflows)
# Targets: aarch64-linux-android, x86_64-unknown-linux-gnu
# ============================================================

name: Release Management

on:
  push:
    tags:
      - 'v*'
      - 'f001-validate*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: full
  NDK_VERSION: r26b
  NDK_SHA256: ad73c0370f0b0a87d1671ed2fd5a9ac9acfd1eb5c43a7fbfbd330f85d19dd632
  API_LEVEL: "26"

permissions:
  contents: write

jobs:
  # ============================================================
  # VERSION PARSING — Extract version info from tag
  # ============================================================
  parse-version:
    name: Parse Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      major: ${{ steps.version.outputs.MAJOR }}
      minor: ${{ steps.version.outputs.MINOR }}
      patch: ${{ steps.version.outputs.PATCH }}
      prerelease: ${{ steps.version.outputs.PRERELEASE }}
      is_prerelease: ${{ steps.version.outputs.IS_PRERELEASE }}
      is_f001: ${{ steps.version.outputs.IS_F001 }}
      channel: ${{ steps.version.outputs.CHANNEL }}
    steps:
      - name: Parse version from tag
        id: version
        run: |
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/v}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "MAJOR=$(echo $VERSION | cut -d. -f1)" >> $GITHUB_OUTPUT
            echo "MINOR=$(echo $VERSION | cut -d. -f2)" >> $GITHUB_OUTPUT
            PATCH_FULL=$(echo $VERSION | cut -d. -f3)
            echo "PATCH=$(echo $PATCH_FULL | cut -d- -f1)" >> $GITHUB_OUTPUT
            echo "IS_F001=false" >> $GITHUB_OUTPUT

            # Detect pre-release suffix
            if echo "$VERSION" | grep -qE '[-]'; then
              PRERELEASE=$(echo "$VERSION" | sed 's/.*-//')
              echo "PRERELEASE=$PRERELEASE" >> $GITHUB_OUTPUT
              echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
              # Determine channel from pre-release suffix
              if echo "$PRERELEASE" | grep -qi 'alpha'; then
                echo "CHANNEL=alpha" >> $GITHUB_OUTPUT
              elif echo "$PRERELEASE" | grep -qi 'beta'; then
                echo "CHANNEL=beta" >> $GITHUB_OUTPUT
              elif echo "$PRERELEASE" | grep -qi 'rc'; then
                echo "CHANNEL=rc" >> $GITHUB_OUTPUT
              else
                echo "CHANNEL=nightly" >> $GITHUB_OUTPUT
              fi
            else
              echo "PRERELEASE=" >> $GITHUB_OUTPUT
              echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
              echo "CHANNEL=stable" >> $GITHUB_OUTPUT
            fi
          elif [[ "$REF" == refs/tags/f001-validate* ]]; then
            VERSION="${REF#refs/tags/}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "MAJOR=0" >> $GITHUB_OUTPUT
            echo "MINOR=0" >> $GITHUB_OUTPUT
            echo "PATCH=0" >> $GITHUB_OUTPUT
            echo "PRERELEASE=f001" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "IS_F001=true" >> $GITHUB_OUTPUT
            echo "CHANNEL=nightly" >> $GITHUB_OUTPUT
          fi

      - name: Display version info
        run: |
          echo "Version:      ${{ steps.version.outputs.VERSION }}"
          echo "Major:        ${{ steps.version.outputs.MAJOR }}"
          echo "Minor:        ${{ steps.version.outputs.MINOR }}"
          echo "Patch:        ${{ steps.version.outputs.PATCH }}"
          echo "Pre-release:  ${{ steps.version.outputs.PRERELEASE }}"
          echo "Is pre-rel:   ${{ steps.version.outputs.IS_PRERELEASE }}"
          echo "Channel:      ${{ steps.version.outputs.CHANNEL }}"

  # ============================================================
  # VALIDATE — Pre-release checks
  # ============================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: parse-version
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Validate tag vs Cargo.toml version
        if: needs.parse-version.outputs.is_f001 != 'true'
        run: |
          TAG_VERSION="${{ needs.parse-version.outputs.version }}"
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Git tag version:    $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch! Tag v${TAG_VERSION} != Cargo.toml ${CARGO_VERSION}"
            exit 1
          fi
          echo "Versions match ✓"

      - name: Validate install.sh dry-run
        run: |
          chmod +x install.sh
          bash install.sh --dry-run --skip-model --skip-service --no-color 2>&1 || true
          echo "install.sh dry-run validated ✓"

  # ============================================================
  # BUILD — Multi-platform binary builds
  # ============================================================
  build-android:
    name: Build Android (aarch64)
    runs-on: ubuntu-latest
    needs: [parse-version, validate]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (stable + aarch64-linux-android)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Android NDK
        id: ndk-cache
        uses: actions/cache@v4
        with:
          path: ~/android-ndk-${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}-linux-${{ env.NDK_SHA256 }}

      - name: Download and verify Android NDK r26b
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o ndk.zip "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
          echo "${NDK_SHA256}  ndk.zip" | sha256sum -c || exit 1
          unzip -q ndk.zip -d $HOME
          rm -f ndk.zip

      - name: Set NDK environment
        run: echo "NDK_HOME=$HOME/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Configure cross-compilation env
        run: |
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=${TOOLCHAIN}/llvm-ar" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "$TOOLCHAIN" >> $GITHUB_PATH

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: release-android

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config

      - name: Build aura-daemon (release)
        run: cargo build --release -p aura-daemon --target aarch64-linux-android --features "aura-llama-sys/stub,aura-daemon/curl-backend"

      - name: Build aura-neocortex (release)
        run: cargo build --release -p aura-neocortex --target aarch64-linux-android --features "aura-llama-sys/stub" || echo "neocortex build non-fatal"

      - name: Strip binaries
        run: |
          STRIP="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          for bin in target/aarch64-linux-android/release/aura-daemon target/aarch64-linux-android/release/aura-neocortex; do
            if [ -f "$bin" ]; then
              echo "Stripping: $bin ($(du -sh $bin | cut -f1))"
              $STRIP "$bin" 2>/dev/null || true
              echo "Stripped:  $bin ($(du -sh $bin | cut -f1))"
            fi
          done

      - name: Package artifacts with checksums
        run: |
          VERSION="${{ needs.parse-version.outputs.version }}"
          mkdir -p dist
          for bin in aura-daemon aura-neocortex; do
            src="target/aarch64-linux-android/release/$bin"
            if [ -f "$src" ]; then
              dst="dist/${bin}-${VERSION}-aarch64-linux-android"
              cp "$src" "$dst"
              sha256sum "$dst" > "${dst}.sha256"
              echo "Packaged: $dst ($(du -sh $dst | cut -f1))"
            fi
          done

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: dist/
          retention-days: 30

  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    needs: [parse-version, validate]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: release-linux

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libopus-dev

      - name: Build (release, stub)
        run: |
          cargo build --release -p aura-daemon --features "aura-llama-sys/stub,aura-daemon/reqwest" --target x86_64-unknown-linux-gnu
          cargo build --release -p aura-neocortex --features "aura-llama-sys/stub" --target x86_64-unknown-linux-gnu || echo "neocortex non-fatal"

      - name: Strip binaries
        run: |
          for bin in target/x86_64-unknown-linux-gnu/release/aura-daemon target/x86_64-unknown-linux-gnu/release/aura-neocortex; do
            if [ -f "$bin" ]; then
              strip "$bin" 2>/dev/null || true
              echo "Stripped: $bin ($(du -sh $bin | cut -f1))"
            fi
          done

      - name: Package artifacts with checksums
        run: |
          VERSION="${{ needs.parse-version.outputs.version }}"
          mkdir -p dist
          for bin in aura-daemon aura-neocortex; do
            src="target/x86_64-unknown-linux-gnu/release/$bin"
            if [ -f "$src" ]; then
              dst="dist/${bin}-${VERSION}-x86_64-linux-gnu"
              cp "$src" "$dst"
              sha256sum "$dst" > "${dst}.sha256"
              echo "Packaged: $dst"
            fi
          done

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/
          retention-days: 30

  # ============================================================
  # CHANGELOG — Auto-generate from commits
  # ============================================================
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: parse-version
    outputs:
      body: ${{ steps.changelog.outputs.BODY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.parse-version.outputs.version }}"
          CHANNEL="${{ needs.parse-version.outputs.channel }}"

          # Find previous v* tag
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | head -2 | tail -1 || echo "")

          {
            echo "BODY<<CHANGELOG_EOF"
            echo "## AURA v${VERSION} (${CHANNEL} channel)"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since ${PREV_TAG}"
              echo ""
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" --no-merges | head -50
              echo ""
              echo ""
              echo "**Full diff:** [\`${PREV_TAG}...v${VERSION}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${VERSION})"
            else
              echo "### Recent Commits"
              echo ""
              git log --pretty=format:"- %s (%h)" -20 --no-merges
            fi

            echo ""
            echo ""
            echo "### Verification"
            echo '```sh'
            echo "sha256sum -c *.sha256"
            echo '```'
            echo ""
            echo "### Installation"
            echo '```sh'
            echo "# On Termux device:"
            echo "bash install.sh --skip-build"
            echo '```'
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Preview changelog
        run: |
          echo "${{ steps.changelog.outputs.BODY }}" | head -30

  # ============================================================
  # CREATE RELEASE — GitHub release with assets
  # ============================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [parse-version, build-android, build-linux, changelog]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Consolidate release assets
        run: |
          mkdir -p release
          cp -v artifacts/release-android/* release/ 2>/dev/null || true
          cp -v artifacts/release-linux/* release/ 2>/dev/null || true

          # Create combined checksums file
          cd release
          cat *.sha256 > SHA256SUMS.txt 2>/dev/null || true
          echo "=== Release assets ==="
          ls -la
          echo "=== SHA256SUMS.txt ==="
          cat SHA256SUMS.txt 2>/dev/null || echo "(no checksums)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ needs.parse-version.outputs.is_f001 == 'true' && 'AURA F001 Validation Build' || format('AURA v{0}', needs.parse-version.outputs.version) }}"
          draft: false
          prerelease: ${{ needs.parse-version.outputs.is_prerelease == 'true' }}
          body: ${{ needs.changelog.outputs.body }}
          files: release/*
          generate_release_notes: false
          make_latest: ${{ needs.parse-version.outputs.channel == 'stable' }}
