# ============================================================
# AURA v4 — Release Pipeline
# Triggers on version tags: v* (e.g. v0.1.0, v1.0.0-beta.1)
#
# Flow:
#   CI checks → Android build → GitHub Release with artifacts
#
# TOOLCHAIN: Must match rust-toolchain.toml (nightly-2026-03-01)
# SECURITY:  All third-party actions pinned to commit SHA
# ============================================================

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: r26b
  # Official SHA256 for android-ndk-r26b-linux.zip (source: Google / conan-center-index)
  NDK_SHA256: "ad73c0370f0b0a87d1671ed2fd5a9ac9acfd1eb5c43a7fbfbd330f85d19dd632"
  API_LEVEL: "21"
  TARGET: aarch64-linux-android

jobs:
  # --------------------------------------------------------
  # Job 1: CI gate — must pass before release is created
  # --------------------------------------------------------
  ci-check:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Rust (nightly-2026-03-01) + components
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: nightly-2026-03-01
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config

      - name: Check (workspace)
        run: cargo check --workspace --features stub

      - name: Test (workspace)
        run: cargo test --workspace --features stub
        env:
          RUST_LOG: debug

      - name: Clippy
        run: cargo clippy --workspace --features stub -- -D warnings

      - name: Format
        run: cargo fmt --check

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit
        run: cargo audit

  # --------------------------------------------------------
  # Job 2: Android cross-compilation (depends on CI gate)
  # --------------------------------------------------------
  build-android:
    name: Build aarch64-linux-android
    runs-on: ubuntu-latest
    needs: ci-check

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Rust (nightly-2026-03-01) + Android target
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: nightly-2026-03-01
          targets: aarch64-linux-android

      - name: Cache cargo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: android-release-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: android-release-cargo-

      - name: Cache Android NDK
        id: ndk-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/android-ndk-${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}-linux-${{ env.NDK_SHA256 }}

      - name: Download and verify Android NDK r26b
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          NDK_URL="https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
          echo "Downloading NDK from: $NDK_URL"
          curl -fsSL "$NDK_URL" -o ndk.zip

          echo "Verifying NDK SHA256 checksum..."
          ACTUAL_SHA256=$(sha256sum ndk.zip | cut -d' ' -f1)
          if [ "$ACTUAL_SHA256" != "$NDK_SHA256" ]; then
            echo "FATAL: NDK checksum mismatch!"
            echo "Expected: $NDK_SHA256"
            echo "Actual:   $ACTUAL_SHA256"
            echo "This could indicate a supply-chain attack or corrupted download."
            rm -f ndk.zip
            exit 1
          fi
          echo "NDK checksum verified: $ACTUAL_SHA256"

          unzip -q ndk.zip -d $HOME
          rm -f ndk.zip

      - name: Set NDK environment
        run: echo "NDK_HOME=$HOME/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Configure cross-compilation env
        run: |
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=${TOOLCHAIN}/llvm-ar" >> $GITHUB_ENV
          echo "${TOOLCHAIN}" >> $GITHUB_PATH

      - name: Install system build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Verify llama.cpp submodule
        run: |
          if [ ! -f "crates/aura-llama-sys/llama.cpp/llama.cpp" ]; then
            echo "ERROR: llama.cpp submodule missing. Cannot build release binary."
            exit 1
          fi

      - name: Build aura-daemon and aura-neocortex (release)
        run: cargo build --release -p aura-daemon -p aura-neocortex --target aarch64-linux-android

      - name: Strip binaries
        run: |
          for BIN in aura-daemon aura-neocortex; do
            "$TOOLCHAIN/llvm-strip" "target/aarch64-linux-android/release/$BIN"
          done

      # Rename binary to include version tag for the release artifact
      - name: Prepare release artifacts
        run: |
          TAG="${{ github.ref_name }}"
          for BIN in aura-daemon aura-neocortex; do
            cp "target/aarch64-linux-android/release/$BIN" \
               "${BIN}-${TAG}-aarch64-linux-android"
          done
          echo "DAEMON_NAME=aura-daemon-${TAG}-aarch64-linux-android" >> $GITHUB_ENV
          echo "NEOCORTEX_NAME=aura-neocortex-${TAG}-aarch64-linux-android" >> $GITHUB_ENV

      # Generate SHA256 checksum sidecar for binary verification
      - name: Generate binary checksums
        run: |
          for BIN in "$DAEMON_NAME" "$NEOCORTEX_NAME"; do
            sha256sum "$BIN" > "${BIN}.sha256"
            echo "SHA256 for $BIN:"
            cat "${BIN}.sha256"
          done

      - name: Upload binary artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-binaries
          path: |
            aura-daemon-*-aarch64-linux-android
            aura-daemon-*-aarch64-linux-android.sha256
            aura-neocortex-*-aarch64-linux-android
            aura-neocortex-*-aarch64-linux-android.sha256
          retention-days: 1
          if-no-files-found: error

  # --------------------------------------------------------
  # Job 3: Create GitHub Release (depends on build)
  # --------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    permissions:
      contents: write

    steps:
      - name: Checkout (for release notes generation)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # full history needed for git log

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-binaries

      - name: Generate release notes from git log
        run: |
          TAG="${{ github.ref_name }}"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — including all commits"
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          {
            echo "## What's Changed"
            echo ""
            git log $RANGE --pretty=format:"- %s (%h)" --no-merges
            echo ""
            echo ""
            echo "## Verification"
            echo ""
            echo "Verify binary integrity with the included \`.sha256\` file:"
            echo '```sh'
            echo "sha256sum -c aura-daemon-${TAG}-aarch64-linux-android.sha256"
            echo '```'
            echo ""
            echo "## Installation"
            echo ""
            echo '```sh'
            echo "# On-device via Termux:"
            echo "curl -fsSL https://raw.githubusercontent.com/\${{ github.repository }}/main/install.sh | bash"
            echo '```'
            echo ""
            echo "**Binary:** \`aura-daemon-${TAG}-aarch64-linux-android\` — built for ARM64 Android (API 21+, Termux)"
          } > release_notes.md

          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@1853d73993c8ca1b2c9c1a7fede39682d0ab5c2a # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AURA v4 ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v0.1.0-beta is pre-release
          files: |
            aura-daemon-*-aarch64-linux-android
            aura-daemon-*-aarch64-linux-android.sha256
            aura-neocortex-*-aarch64-linux-android
            aura-neocortex-*-aarch64-linux-android.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
