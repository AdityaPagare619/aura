name: AURA Release Pipeline

on:
  push:
    tags:
      - 'v*'
      - 'f001-validate*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get version
        id: version
        run: |
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            echo "VERSION=${REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "MAJOR=$(echo $VERSION | cut -d. -f1)" >> $GITHUB_OUTPUT
            echo "IS_F001=false" >> $GITHUB_OUTPUT
          elif [[ "$REF" == refs/tags/f001-validate* ]]; then
            echo "VERSION=${REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "MAJOR=0" >> $GITHUB_OUTPUT
            echo "IS_F001=true" >> $GITHUB_OUTPUT
          fi
          echo "TAG_REF=$REF" >> $GITHUB_OUTPUT
      
      - name: Create tag if needed (for v* tags only)
        if: steps.version.outputs.IS_F001 == 'false'
        run: |
          git tag v${{ steps.version.outputs.VERSION }} 2>/dev/null || true
      
      - name: Set up Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: aarch64-linux-android
      
      - name: Build release binaries
        run: |
          cargo build --release -p aura-daemon --target aarch64-linux-android
          cargo build --release -p aura-neocortex --target aarch64-linux-android
      
      - name: Generate checksums
        run: |
          sha256sum target/aarch64-linux-android/release/aura-daemon > aura-daemon.sha256
          sha256sum target/aarch64-linux-android/release/aura-neocortex > aura-neocortex.sha256
          cat aura-daemon.sha256
          cat aura-neocortex.sha256
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.version.outputs.IS_F001 == 'true' && 'AURA F001 Validation Build' || 'AURA v' + steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ steps.version.outputs.IS_F001 == 'true' || steps.version.outputs.MAJOR < 4 }}
          body: |
            ## F001 Real Device Validation Build

            This release contains the F001 fix (lto="thin", panic="unwind") applied and verified.

            ### Binary
            - `aura-daemon`: ARM64 Android binary (fully statically linked)
            - Built from commit `554ef61746175556284cab2141e53cb01e5aaf8d`

            ### Verification
            SHA256 checksums are provided for binary integrity verification.
          files: |
            target/aarch64-linux-android/release/aura-daemon
            target/aarch64-linux-android/release/aura-neocortex
            aura-daemon.sha256
            aura-neocortex.sha256
          generate_release_notes: false