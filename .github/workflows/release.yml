# ============================================================
# AURA v4 — Release Pipeline
# Triggers on version tags: v* (e.g. v0.1.0, v1.0.0-beta.1)
#
# Flow:
#   CI checks → Android build → GitHub Release with artifacts
#
# TOOLCHAIN: Must match rust-toolchain.toml (stable + date pin)
# SECURITY:  All third-party actions pinned to commit SHA
# DIAGNOSTIC: Unstripped binaries + ELF analysis artifacts included for SIGSEGV triage
# ============================================================

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: r26b
  # Official SHA256 for android-ndk-r26b-linux.zip (source: Google / conan-center-index)
  NDK_SHA256: "ad73c0370f0b0a87d1671ed2fd5a9ac9acfd1eb5c43a7fbfbd330f85d19dd632"
  API_LEVEL: "26"
  TARGET: aarch64-linux-android

jobs:
  # --------------------------------------------------------
  # Job 1: CI gate — must pass before release is created
  # --------------------------------------------------------
  ci-check:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install Rust (stable) + components
        # CHANGED: nightly-2026-03-01 → stable (F001 fix: NDK #2073 — panic=abort+LTO crashes)
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libopus-dev

      - name: Check (workspace)
        run: cargo check --workspace --features "aura-llama-sys/stub,aura-daemon/voice"

      - name: Test (workspace)
        run: cargo test --workspace --features "aura-llama-sys/stub,aura-daemon/voice"
        env:
          RUST_LOG: debug

      - name: Clippy
        run: cargo clippy --workspace --features "aura-llama-sys/stub,aura-daemon/voice" -- -D warnings

      - name: Format
        run: cargo fmt --check

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit
        run: cargo audit

  # --------------------------------------------------------
  # Job 2: Android cross-compilation (depends on CI gate)
  # --------------------------------------------------------
  build-android:
    name: Build aarch64-linux-android
    runs-on: ubuntu-latest
    needs: ci-check

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install Rust (stable) + Android target
        # CHANGED: nightly-2026-03-01 → stable (F001 fix: NDK #2073 — panic=abort+LTO crashes)
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: android-release-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: android-release-cargo-

      - name: Cache Android NDK
        id: ndk-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/android-ndk-${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}-linux-${{ env.NDK_SHA256 }}

      - name: Download and verify Android NDK r26b
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          NDK_URL="https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
          echo "Downloading NDK from: $NDK_URL"
          curl -fsSL "$NDK_URL" -o ndk.zip

          echo "Verifying NDK SHA256 checksum..."
          ACTUAL_SHA256=$(sha256sum ndk.zip | cut -d' ' -f1)
          if [ "$ACTUAL_SHA256" != "$NDK_SHA256" ]; then
            echo "FATAL: NDK checksum mismatch!"
            echo "Expected: $NDK_SHA256"
            echo "Actual:   $ACTUAL_SHA256"
            echo "This could indicate a supply-chain attack or corrupted download."
            rm -f ndk.zip
            exit 1
          fi
          echo "NDK checksum verified: $ACTUAL_SHA256"

          unzip -q ndk.zip -d $HOME
          rm -f ndk.zip

      - name: Set NDK environment
        run: echo "NDK_HOME=$HOME/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Configure cross-compilation env
        run: |
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOST_TAG=linux-x86_64" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=${TOOLCHAIN}/llvm-ar" >> $GITHUB_ENV

          # Mirror Build Android job linker search roots so release builds
          # resolve static libc++ deterministically.
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_RUSTFLAGS=-L native=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib -L native=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android -L native=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/${API_LEVEL}" >> $GITHUB_ENV
          echo "${TOOLCHAIN}" >> $GITHUB_PATH

      - name: Install system build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Verify llama.cpp submodule
        run: |
          if [ ! -f "crates/aura-llama-sys/llama.cpp/llama.cpp" ]; then
            echo "ERROR: llama.cpp submodule missing. Cannot build release binary."
            exit 1
          fi

      - name: Build aura-daemon and aura-neocortex (release)
        run: cargo build --release -p aura-daemon -p aura-neocortex --target aarch64-linux-android

      - name: Copy unstripped binaries (for crash analysis)
        run: |
          TAG="${{ github.ref_name }}"
          for BIN in aura-daemon aura-neocortex; do
            cp "target/aarch64-linux-android/release/$BIN" \
               "target/aarch64-linux-android/${BIN}-unstripped-${TAG}-aarch64-linux-android"
          done

      - name: Strip binaries
        run: |
          for BIN in aura-daemon aura-neocortex; do
            "$TOOLCHAIN/llvm-strip" "target/aarch64-linux-android/release/$BIN"
          done

      - name: Install termux-elf-cleaner (Termux ELF sanitizer)
        run: |
          TERMUX_CLEANER_VERSION="v2.5"
          curl -fsSL "https://github.com/termux/termux-elf-cleaner/releases/download/${TERMUX_CLEANER_VERSION}/termux-elf-cleaner-${TERMUX_CLEANER_VERSION#v}-aarch64-linux-android.tar.gz" -o termux-elf-cleaner.tar.gz
          tar xzf termux-elf-cleaner.tar.gz
          chmod +x termux-elf-cleaner
          echo "termux-elf-cleaner installed: $(./termux-elf-cleaner --version 2>&1 || echo 'version check done')"

      - name: Run termux-elf-cleaner (belt-and-suspenders hygiene)
        run: |
          for BIN in aura-daemon aura-neocortex; do
            echo "Cleaning $BIN..."
            ./termux-elf-cleaner "target/aarch64-linux-android/release/$BIN" || echo "  (warning: non-fatal)"
          done

      - name: Readelf analysis (ELF structure snapshot for diagnostics)
        run: |
          mkdir -p elf-analysis
          for BIN in aura-daemon aura-neocortex; do
            BASE="target/aarch64-linux-android/release/$BIN"
            UNSTRIPPED="target/aarch64-linux-android/${BIN}-unstripped-${{ github.ref_name }}-aarch64-linux-android"

            echo "=== $BIN — STRIPPED ELF headers ===" > "elf-analysis/${BIN}-stripped-elf-headers.txt"
            "$TOOLCHAIN/llvm-readelf" -h "$BASE" >> "elf-analysis/${BIN}-stripped-elf-headers.txt"

            echo "=== $BIN — STRIPPED program headers ===" > "elf-analysis/${BIN}-stripped-program-headers.txt"
            "$TOOLCHAIN/llvm-readelf" -l "$BASE" >> "elf-analysis/${BIN}-stripped-program-headers.txt"

            echo "=== $BIN — STRIPPED dynamic section ===" > "elf-analysis/${BIN}-stripped-dynamic-section.txt"
            "$TOOLCHAIN/llvm-readelf" -d "$BASE" >> "elf-analysis/${BIN}-stripped-dynamic-section.txt"

            echo "=== $BIN — UNSTRIPPED ELF headers ===" > "elf-analysis/${BIN}-unstripped-elf-headers.txt"
            "$TOOLCHAIN/llvm-readelf" -h "$UNSTRIPPED" >> "elf-analysis/${BIN}-unstripped-elf-headers.txt"

            echo "=== $BIN — UNSTRIPPED section headers ===" > "elf-analysis/${BIN}-unstripped-section-headers.txt"
            "$TOOLCHAIN/llvm-readelf" -S "$UNSTRIPPED" >> "elf-analysis/${BIN}-unstripped-section-headers.txt"

            echo "=== $BIN — UNSTRIPPED dynamic section ===" > "elf-analysis/${BIN}-unstripped-dynamic-section.txt"
            "$TOOLCHAIN/llvm-readelf" -d "$UNSTRIPPED" >> "elf-analysis/${BIN}-unstripped-dynamic-section.txt"
          done
          echo "ELF analysis complete. Artifacts:"
          ls -la elf-analysis/

      - name: Generate BUILD-INFO.txt
        run: |
          TAG="${{ github.ref_name }}"
          {
            echo "AURA v4 Release Build Info"
            echo "=========================="
            echo "Tag:         $TAG"
            echo "Git commit:  $(git rev-parse HEAD)"
            echo "Git branch:  ${{ github.ref_name }}"
            echo "Build date:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "Rust version:"
            rustc --version
            echo ""
            echo "Cargo version:"
            cargo --version
            echo ""
            echo "NDK version: $NDK_VERSION"
            echo "NDK path:    $NDK_HOME"
            echo "API level:   $API_LEVEL"
            echo "Target:      $TARGET"
            echo ""
            echo "LLVM toolchain:"
            echo "  llvm-readelf: $("$TOOLCHAIN/llvm-readelf" --version | head -1)"
            echo "  llvm-strip:   $("$TOOLCHAIN/llvm-strip" --version | head -1)"
            echo ""
            echo "termux-elf-cleaner version: $("$PWD/termux-elf-cleaner" --version 2>&1 || echo 'unknown')"
          } > "BUILD-INFO.txt"
          cat "BUILD-INFO.txt"

      - name: Verify Android runtime dependencies
        run: |
          set -euo pipefail

          READELF="$TOOLCHAIN/llvm-readelf"
          if [ ! -x "$READELF" ]; then
            echo "ERROR: llvm-readelf not found at $READELF"
            exit 1
          fi

          check_needed() {
            local bin="$1"
            echo "Inspecting dynamic deps for: $bin"

            local needed
            needed="$($READELF -d "$bin" | awk '/NEEDED/ {print $5}' | tr -d '[]' || true)"

            if [ -n "$needed" ]; then
              echo "$needed" | sed 's/^/  NEEDED: /'
            else
              echo "  NEEDED: <none>"
            fi

            # Production invariant for Termux one-line installs:
            # release binaries must not require libc++_shared.so at runtime.
            if printf '%s\n' "$needed" | grep -Fqx 'libc++_shared.so'; then
              echo "ERROR: $bin depends on libc++_shared.so (not guaranteed on target devices)."
              echo "Fix: link C++ runtime statically for Android release artifacts."
              exit 1
            fi
          }

          check_needed "target/aarch64-linux-android/release/aura-daemon"
          check_needed "target/aarch64-linux-android/release/aura-neocortex"

      # Rename binary to include version tag for the release artifact
      - name: Prepare release artifacts
        run: |
          TAG="${{ github.ref_name }}"
          for BIN in aura-daemon aura-neocortex; do
            cp "target/aarch64-linux-android/release/$BIN" \
               "${BIN}-${TAG}-aarch64-linux-android"
          done
          echo "DAEMON_NAME=aura-daemon-${TAG}-aarch64-linux-android" >> $GITHUB_ENV
          echo "NEOCORTEX_NAME=aura-neocortex-${TAG}-aarch64-linux-android" >> $GITHUB_ENV
          echo "DAEMON_UNSTRIPPED=aura-daemon-unstripped-${TAG}-aarch64-linux-android" >> $GITHUB_ENV
          echo "NEOCORTEX_UNSTRIPPED=aura-neocortex-unstripped-${TAG}-aarch64-linux-android" >> $GITHUB_ENV

      # Generate SHA256 checksum sidecar for binary verification
      - name: Generate binary checksums
        run: |
          for BIN in "$DAEMON_NAME" "$NEOCORTEX_NAME" "$DAEMON_UNSTRIPPED" "$NEOCORTEX_UNSTRIPPED"; do
            sha256sum "$BIN" > "${BIN}.sha256"
            echo "SHA256 for $BIN:"
            cat "${BIN}.sha256"
          done

      - name: Upload stripped release binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-binaries
          path: |
            aura-daemon-*-aarch64-linux-android
            aura-daemon-*-aarch64-linux-android.sha256
            aura-neocortex-*-aarch64-linux-android
            aura-neocortex-*-aarch64-linux-android.sha256
            BUILD-INFO.txt
          retention-days: 90
          if-no-files-found: error

      - name: Upload unstripped diagnostic binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-binaries-unstripped
          path: |
            aura-daemon-unstripped-*-aarch64-linux-android
            aura-daemon-unstripped-*-aarch64-linux-android.sha256
            aura-neocortex-unstripped-*-aarch64-linux-android
            aura-neocortex-unstripped-*-aarch64-linux-android.sha256
          retention-days: 90
          if-no-files-found: error

      - name: Upload ELF analysis artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-binaries-elf-analysis
          path: elf-analysis/
          retention-days: 90
          if-no-files-found: error

  # --------------------------------------------------------
  # Job 3: Create GitHub Release (depends on build)
  # --------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    permissions:
      contents: write

    steps:
      - name: Checkout (for release notes generation)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # full history needed for git log

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-binaries

      - name: Download unstripped diagnostic binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-binaries-unstripped
          path: unstripped

      - name: Download ELF analysis artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-binaries-elf-analysis
          path: elf-analysis

      - name: Generate release notes from git log
        run: |
          TAG="${{ github.ref_name }}"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — including all commits"
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          {
            echo "## What's Changed"
            echo ""
            git log $RANGE --pretty=format:"- %s (%h)" --no-merges
            echo ""
            echo ""
            echo "## Verification"
            echo ""
            echo "Verify binary integrity with the included \`.sha256\` files:"
            echo '```sh'
            echo "sha256sum -c aura-daemon-${TAG}-aarch64-linux-android.sha256"
            echo "sha256sum -c aura-neocortex-${TAG}-aarch64-linux-android.sha256"
            echo '```'
            echo ""
            echo "## Installation"
            echo ""
            echo '```sh'
            echo "# On-device via Termux:"
            echo "curl -fsSL https://raw.githubusercontent.com/\${{ github.repository }}/main/install.sh | bash"
            echo '```'
            echo ""
            echo "## Artifacts"
            echo ""
            echo "### Stripped Release Binaries"
            echo "- \`aura-daemon-${TAG}-aarch64-linux-android\`"
            echo "- \`aura-neocortex-${TAG}-aarch64-linux-android\`"
            echo ""
            echo "### Unstripped Diagnostic Binaries (for crash analysis)"
            echo "These retain full debug symbols for use with \`addr2line\`, \`gdb\`, or \`llvm-symbolizer\`."
            echo '```sh'
            echo "# Map crash address to source location:"
            echo "aarch64-linux-android-addr2line -Cfae -e aura-daemon-unstripped-${TAG}-aarch64-linux-android 0x<address>"
            echo '```'
            echo "- \`aura-daemon-unstripped-${TAG}-aarch64-linux-android\`"
            echo "- \`aura-neocortex-unstripped-${TAG}-aarch64-linux-android\`"
            echo ""
            echo "### ELF Analysis Snapshots"
            echo "ELF headers, program headers, dynamic section, and section headers captured at build time."
            echo "See \`elf-analysis/\` directory in the ELF analysis artifact."
            echo ""
            echo "### Build Info"
            echo "Reproducibility metadata: \`BUILD-INFO.txt\`"
            echo ""
            echo "Built for ARM64 Android (API 26+, Termux)."
          } > release_notes.md

          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AURA v4 ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v0.1.0-beta is pre-release
          files: |
            aura-daemon-*-aarch64-linux-android
            aura-daemon-*-aarch64-linux-android.sha256
            aura-neocortex-*-aarch64-linux-android
            aura-neocortex-*-aarch64-linux-android.sha256
            unstripped/aura-daemon-unstripped-*-aarch64-linux-android
            unstripped/aura-daemon-unstripped-*-aarch64-linux-android.sha256
            unstripped/aura-neocortex-unstripped-*-aarch64-linux-android
            unstripped/aura-neocortex-unstripped-*-aarch64-linux-android.sha256
            elf-analysis/
            BUILD-INFO.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
