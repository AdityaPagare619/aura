# ============================================================
# AURA v4 — Release Pipeline
# Triggers on version tags: v* (e.g. v0.1.0, v1.0.0-beta.1)
#
# Flow:
#   CI checks → Android build → GitHub Release with artifacts
#
# TOOLCHAIN: Must match rust-toolchain.toml (nightly-2026-03-01)
# SECURITY:  All third-party actions pinned to commit SHA
# ============================================================

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: r26b
  # Official SHA256 for android-ndk-r26b-linux.zip (source: Google / conan-center-index)
  NDK_SHA256: "ad73c0370f0b0a87d1671ed2fd5a9ac9acfd1eb5c43a7fbfbd330f85d19dd632"
  API_LEVEL: "26"
  TARGET: aarch64-linux-android

jobs:
  # --------------------------------------------------------
  # Job 1: CI gate — must pass before release is created
  # --------------------------------------------------------
  ci-check:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install Rust (nightly-2026-03-01) + components
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: nightly-2026-03-01
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libopus-dev

      - name: Check (workspace)
        run: cargo check --workspace --features "aura-llama-sys/stub,aura-daemon/voice"

      - name: Test (workspace)
        run: cargo test --workspace --features "aura-llama-sys/stub,aura-daemon/voice"
        env:
          RUST_LOG: debug

      - name: Clippy
        run: cargo clippy --workspace --features "aura-llama-sys/stub,aura-daemon/voice" -- -D warnings

      - name: Format
        run: cargo fmt --check

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit
        run: cargo audit

  # --------------------------------------------------------
  # Job 2: Android cross-compilation (depends on CI gate)
  # --------------------------------------------------------
  build-android:
    name: Build aarch64-linux-android
    runs-on: ubuntu-latest
    needs: ci-check
    permissions:
      contents: read

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install Rust (nightly-2026-03-01) + Android target
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: nightly-2026-03-01
          targets: aarch64-linux-android

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: android-release-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: android-release-cargo-

      - name: Cache Android NDK
        id: ndk-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/android-ndk-${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}-linux-${{ env.NDK_SHA256 }}

      - name: Download and verify Android NDK r26b
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          NDK_URL="https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
          echo "Downloading NDK from: $NDK_URL"
          curl -fsSL "$NDK_URL" -o ndk.zip

          echo "Verifying NDK SHA256 checksum..."
          ACTUAL_SHA256=$(sha256sum ndk.zip | cut -d' ' -f1)
          if [ "$ACTUAL_SHA256" != "$NDK_SHA256" ]; then
            echo "FATAL: NDK checksum mismatch!"
            echo "Expected: $NDK_SHA256"
            echo "Actual:   $ACTUAL_SHA256"
            echo "This could indicate a supply-chain attack or corrupted download."
            rm -f ndk.zip
            exit 1
          fi
          echo "NDK checksum verified: $ACTUAL_SHA256"

          unzip -q ndk.zip -d $HOME
          rm -f ndk.zip

      - name: Set NDK environment
        run: echo "NDK_HOME=$HOME/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Configure cross-compilation env
        run: |
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOST_TAG=linux-x86_64" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=${TOOLCHAIN}/llvm-ar" >> $GITHUB_ENV

          # Mirror Build Android job linker search roots so release builds
          # resolve static libc++ deterministically.
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_RUSTFLAGS=-L native=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib -L native=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android -L native=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/${API_LEVEL}" >> $GITHUB_ENV
          echo "${TOOLCHAIN}" >> $GITHUB_PATH

      - name: Install system build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Verify llama.cpp submodule
        run: |
          if [ ! -f "crates/aura-llama-sys/llama.cpp/llama.cpp" ]; then
            echo "ERROR: llama.cpp submodule missing. Cannot build release binary."
            exit 1
          fi

      - name: Build aura-daemon and aura-neocortex (release)
        run: cargo build --release -p aura-daemon -p aura-neocortex --target aarch64-linux-android

      - name: Strip binaries
        run: |
          for BIN in aura-daemon aura-neocortex; do
            "$TOOLCHAIN/llvm-strip" "target/aarch64-linux-android/release/$BIN"
          done

      # ── Binary Contract ──────────────────────────────────────────────────
      # Hard gate that validates every artifact satisfies the minimum identity
      # contract BEFORE any checksum or release upload proceeds.
      # Checks:
      #   A) ELF magic bytes  → rejects HTML error pages or truncated files
      #   B) Machine = EM_AARCH64 (0xb7)  → rejects wrong-architecture binaries
      #   C) Type = ET_EXEC (2) or ET_DYN (3/PIE)  → rejects corrupt ELF
      #   D) No forbidden shared libraries (libc++_shared.so, libstdc++.so, etc.)
      #   E) Section count > 0  → rejects empty/stripped-to-nothing binaries
      # Any failure is class F_BINARY_CONTRACT and blocks the release.
      - name: Binary Contract — ELF identity + dependency policy
        run: |
          set -euo pipefail

          READELF="$TOOLCHAIN/llvm-readelf"
          if [ ! -x "$READELF" ]; then
            echo "ERROR: llvm-readelf not found at $READELF"
            exit 1
          fi

          # Forbidden shared libraries — runtime availability on bare Termux is NOT guaranteed.
          FORBIDDEN_LIBS="libc++_shared.so libstdc++.so libstdc++.so.6"

          binary_contract() {
            local bin="$1"
            local label
            label="$(basename "$bin")"
            echo "━━━ Binary Contract: $label ━━━"

            # ── A: ELF magic ────────────────────────────────────────────────
            # First 4 bytes must be 0x7f 0x45 0x4c 0x46 ("\x7fELF")
            local magic
            magic=$(od -A n -N 4 -t x1 "$bin" 2>/dev/null | tr -d ' \n')
            echo "  ELF magic:   $magic"
            if [ "$magic" != "7f454c46" ]; then
              echo "  FAIL [A] ELF magic mismatch — expected 7f454c46, got $magic"
              echo "  This usually means the binary was replaced by an HTML error page,"
              echo "  a truncated download, or a completely wrong file."
              return 1
            fi
            echo "  PASS [A] ELF magic OK"

            # ── B: Machine type EM_AARCH64 (bytes 19-18 in ELF header = 0x00b7) ─
            # ELF e_machine is at offset 18-19 (little-endian = b7 00)
            local machine_le
            machine_le=$(od -A n -j 18 -N 2 -t x1 "$bin" 2>/dev/null | tr -d ' \n')
            echo "  e_machine:   $machine_le (LE bytes)"
            # LE: b7 00 = EM_AARCH64 = 183
            if [ "$machine_le" != "b700" ]; then
              echo "  FAIL [B] Wrong architecture — expected b700 (EM_AARCH64), got $machine_le"
              echo "  Binary is not AArch64. Wrong toolchain or cached artifact from different arch."
              return 1
            fi
            echo "  PASS [B] Architecture = EM_AARCH64"

            # ── C: ELF type ET_EXEC (0200) or ET_DYN (0300 = PIE) ───────────
            # ELF e_type is at offset 16-17 (little-endian)
            local etype_le
            etype_le=$(od -A n -j 16 -N 2 -t x1 "$bin" 2>/dev/null | tr -d ' \n')
            echo "  e_type:      $etype_le (LE bytes)"
            # 02 00 = ET_EXEC, 03 00 = ET_DYN (PIE executables appear as ET_DYN)
            if [ "$etype_le" != "0200" ] && [ "$etype_le" != "0300" ]; then
              echo "  FAIL [C] Unexpected ELF type $etype_le — expected 0200 (ET_EXEC) or 0300 (ET_DYN/PIE)"
              return 1
            fi
            echo "  PASS [C] ELF type OK ($etype_le)"

            # ── D: Dependency policy ─────────────────────────────────────────
            local needed
            needed="$($READELF -d "$bin" 2>/dev/null | awk '/NEEDED/ {print $5}' | tr -d '[]' || true)"
            if [ -n "$needed" ]; then
              echo "  Dynamic NEEDED libs:"
              echo "$needed" | sed 's/^/    /'
            else
              echo "  Dynamic NEEDED libs: <none — statically linked>"
            fi
            local dep_fail=0
            for forbidden in $FORBIDDEN_LIBS; do
              if printf '%s\n' "$needed" | grep -Fqx "$forbidden"; then
                echo "  FAIL [D] Forbidden dependency: $forbidden"
                echo "       This library is not guaranteed present on bare Termux/Android."
                dep_fail=1
              fi
            done
            if [ "$dep_fail" -eq 1 ]; then
              return 1
            fi
            echo "  PASS [D] Dependency policy OK"

            # ── E: Section count sanity ──────────────────────────────────────
            local shnum
            shnum=$("$READELF" -h "$bin" 2>/dev/null | awk '/Number of section headers/ {print $NF}' || echo "0")
            echo "  Section headers: $shnum"
            if [ "${shnum:-0}" -eq 0 ]; then
              echo "  FAIL [E] Zero section headers — binary may be corrupt or over-stripped"
              return 1
            fi
            echo "  PASS [E] Section count OK ($shnum sections)"

            echo "  ✓ Binary Contract PASSED for $label"
            echo ""
          }

          binary_contract "target/aarch64-linux-android/release/aura-daemon"
          binary_contract "target/aarch64-linux-android/release/aura-neocortex"

          echo "All binary contract checks passed."

      # ── Stale-artifact detection ─────────────────────────────────────────
      # Compares the new binary digest against the previously published release.
      # A matching digest means no runtime code changed since the last release,
      # which is a strong signal that this release is premature or that the
      # build cache served a stale artifact.
      # The check is advisory (warn, not fail) to handle legitimate no-op releases.
      - name: Stale-artifact detection (compare digest vs previous release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          echo "Current tag: $TAG"

          # Fetch the most recent release that is NOT this tag (previous release).
          PREV_TAG=$(gh release list --repo "$REPO" --limit 10 --json tagName \
            --jq "[.[] | select(.tagName != \"$TAG\") | .tagName] | first" 2>/dev/null || true)

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "null" ]; then
            echo "No previous release found — skipping stale-artifact check (first release)."
            exit 0
          fi

          echo "Previous release tag: $PREV_TAG"

          stale_check() {
            local bin_name="$1"
            local new_bin="$2"

            # Try to download the previous release's .sha256 sidecar.
            local prev_sha_url="https://github.com/${REPO}/releases/download/${PREV_TAG}/${bin_name}-${PREV_TAG}-aarch64-linux-android.sha256"
            local prev_sha
            prev_sha=$(curl --fail --silent --location "$prev_sha_url" 2>/dev/null | cut -d' ' -f1 || true)

            if [ -z "$prev_sha" ]; then
              echo "Could not fetch previous SHA256 for $bin_name from $prev_sha_url — skipping."
              return 0
            fi

            local new_sha
            new_sha=$(sha256sum "$new_bin" | cut -d' ' -f1)

            echo "$bin_name: prev=$prev_sha  new=$new_sha"

            if [ "$new_sha" = "$prev_sha" ]; then
              echo "::warning title=Stale Artifact::$bin_name binary digest is IDENTICAL to $PREV_TAG."
              echo "  This means no runtime code changed between releases."
              echo "  If this is intentional (installer-only release), add '[no-binary-change]'"
              echo "  to the tag message. Otherwise the build cache may have served stale objects."
              echo ""
              echo "  Stale release invariant violated — blocking release."
              echo "  To override (installer-only release): re-tag with message containing [no-binary-change]"
              # Check if the tag message explicitly overrides
              local tag_msg
              tag_msg=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || true)
              if printf '%s\n' "$tag_msg" | grep -qF '[no-binary-change]'; then
                echo "  Override '[no-binary-change]' found in tag message — allowing stale binary."
                return 0
              fi
              return 1
            else
              echo "$bin_name: digest changed from $PREV_TAG ✓"
            fi
          }

          stale_check "aura-daemon" "target/aarch64-linux-android/release/aura-daemon"
          stale_check "aura-neocortex" "target/aarch64-linux-android/release/aura-neocortex"

      # ── Truth Bundle manifest ─────────────────────────────────────────────
      # An immutable JSON record that captures the full provenance of every
      # release artifact.  Uploaded alongside the binaries so any future audit
      # can verify what was built, when, and by whom.
      - name: Generate truth bundle manifest
        run: |
          set -euo pipefail

          TAG="${{ github.ref_name }}"
          COMMIT="${{ github.sha }}"
          RUN_ID="${{ github.run_id }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${RUN_ID}"

          READELF="$TOOLCHAIN/llvm-readelf"

          # Build a JSON array of quoted NEEDED library names for a binary.
          needed_json_array() {
            local bin="$1"
            local libs
            libs="$($READELF -d "$bin" 2>/dev/null | awk '/NEEDED/ {print $5}' | tr -d '[]' || true)"
            if [ -z "$libs" ]; then
              printf '[]'
              return
            fi
            # Print each line as a quoted JSON string; prefix ", " from the second entry on.
            local joined
            joined=$(printf '%s\n' "$libs" | awk '{if(NR>1) printf ", "; printf "\"%s\"", $0}')
            printf '[%s]' "$joined"
          }

          # Collect per-binary facts using plain variable assignments and echo
          # to avoid any heredoc trailing-comma ambiguity.
          daemon_bin="target/aarch64-linux-android/release/aura-daemon"
          neocortex_bin="target/aarch64-linux-android/release/aura-neocortex"

          D_SHA=$(sha256sum "$daemon_bin" | cut -d' ' -f1)
          D_SIZE=$(stat -c '%s' "$daemon_bin")
          D_MACHINE=$(od -A n -j 18 -N 2 -t x1 "$daemon_bin" 2>/dev/null | tr -d ' \n')
          D_TYPE=$(od -A n -j 16 -N 2 -t x1 "$daemon_bin" 2>/dev/null | tr -d ' \n')
          D_LIBS=$(needed_json_array "$daemon_bin")

          N_SHA=$(sha256sum "$neocortex_bin" | cut -d' ' -f1)
          N_SIZE=$(stat -c '%s' "$neocortex_bin")
          N_MACHINE=$(od -A n -j 18 -N 2 -t x1 "$neocortex_bin" 2>/dev/null | tr -d ' \n')
          N_TYPE=$(od -A n -j 16 -N 2 -t x1 "$neocortex_bin" 2>/dev/null | tr -d ' \n')
          N_LIBS=$(needed_json_array "$neocortex_bin")

          {
            echo "{"
            echo "  \"schema_version\": 1,"
            echo "  \"tag\": \"${TAG}\","
            echo "  \"commit_sha\": \"${COMMIT}\","
            echo "  \"workflow_run_id\": \"${RUN_ID}\","
            echo "  \"workflow_run_url\": \"${RUN_URL}\","
            echo "  \"build_timestamp_utc\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\","
            echo "  \"ndk_version\": \"${NDK_VERSION}\","
            echo "  \"api_level\": \"${API_LEVEL}\","
            echo "  \"target\": \"${TARGET}\","
            echo "  \"daemon_sha256\": \"${D_SHA}\","
            echo "  \"daemon_size_bytes\": ${D_SIZE},"
            echo "  \"daemon_elf_machine\": \"${D_MACHINE}\","
            echo "  \"daemon_elf_type\": \"${D_TYPE}\","
            echo "  \"daemon_needed_libs\": ${D_LIBS},"
            echo "  \"neocortex_sha256\": \"${N_SHA}\","
            echo "  \"neocortex_size_bytes\": ${N_SIZE},"
            echo "  \"neocortex_elf_machine\": \"${N_MACHINE}\","
            echo "  \"neocortex_elf_type\": \"${N_TYPE}\","
            echo "  \"neocortex_needed_libs\": ${N_LIBS},"
            echo "  \"binary_contract_passed\": true"
            echo "}"
          } > "release-truth-bundle-${TAG}.json"

          echo "Truth bundle:"
          cat "release-truth-bundle-${TAG}.json"

      # Rename binary to include version tag for the release artifact
      - name: Prepare release artifacts
        run: |
          TAG="${{ github.ref_name }}"
          for BIN in aura-daemon aura-neocortex; do
            cp "target/aarch64-linux-android/release/$BIN" \
               "${BIN}-${TAG}-aarch64-linux-android"
          done
          echo "DAEMON_NAME=aura-daemon-${TAG}-aarch64-linux-android" >> $GITHUB_ENV
          echo "NEOCORTEX_NAME=aura-neocortex-${TAG}-aarch64-linux-android" >> $GITHUB_ENV

      # Generate SHA256 checksum sidecar for binary verification
      - name: Generate binary checksums
        run: |
          for BIN in "$DAEMON_NAME" "$NEOCORTEX_NAME"; do
            sha256sum "$BIN" > "${BIN}.sha256"
            echo "SHA256 for $BIN:"
            cat "${BIN}.sha256"
          done

      - name: Upload binary artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-binaries
          path: |
            aura-daemon-*-aarch64-linux-android
            aura-daemon-*-aarch64-linux-android.sha256
            aura-neocortex-*-aarch64-linux-android
            aura-neocortex-*-aarch64-linux-android.sha256
            release-truth-bundle-*.json
          retention-days: 1
          if-no-files-found: error

  # --------------------------------------------------------
  # Job 3: Create GitHub Release (depends on build)
  # --------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    permissions:
      contents: write

    steps:
      - name: Checkout (for release notes generation)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # full history needed for git log

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-binaries

      - name: Generate release notes from git log
        run: |
          TAG="${{ github.ref_name }}"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — including all commits"
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          {
            echo "## What's Changed"
            echo ""
            git log $RANGE --pretty=format:"- %s (%h)" --no-merges
            echo ""
            echo ""
            echo "## Verification"
            echo ""
            echo "Verify binary integrity with the included \`.sha256\` files:"
            echo '```sh'
            echo "sha256sum -c aura-daemon-${TAG}-aarch64-linux-android.sha256"
            echo "sha256sum -c aura-neocortex-${TAG}-aarch64-linux-android.sha256"
            echo '```'
            echo ""
            echo "The \`release-truth-bundle-${TAG}.json\` file records the full provenance"
            echo "of this build: commit SHA, workflow run ID, ELF metadata, and artifact"
            echo "checksums. Use it to audit any release artifact."
            echo ""
            echo "## Installation"
            echo ""
            echo '```sh'
            echo "# On-device via Termux:"
            echo "curl -fsSL https://raw.githubusercontent.com/\${{ github.repository }}/main/install.sh | bash"
            echo '```'
            echo ""
            echo "**Binaries:**"
            echo "- \`aura-daemon-${TAG}-aarch64-linux-android\`"
            echo "- \`aura-neocortex-${TAG}-aarch64-linux-android\`"
            echo ""
            echo "Built for ARM64 Android (API 26+, Termux)."
          } > release_notes.md

          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AURA v4 ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v0.1.0-beta is pre-release
          files: |
            aura-daemon-*-aarch64-linux-android
            aura-daemon-*-aarch64-linux-android.sha256
            aura-neocortex-*-aarch64-linux-android
            aura-neocortex-*-aarch64-linux-android.sha256
            release-truth-bundle-*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
