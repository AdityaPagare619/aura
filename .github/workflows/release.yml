name: AURA Release Pipeline

on:
  push:
    tags:
      - 'v*'
      - 'f001-validate*'

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: r26b
  NDK_SHA256: ad73c0370f0b0a87d1671ed2fd5a9ac9acfd1eb5c43a7fbfbd330f85d19dd632
  API_LEVEL: "26"
  TARGET: aarch64-linux-android

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            echo "VERSION=${REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "MAJOR=$(echo $VERSION | cut -d. -f1)" >> $GITHUB_OUTPUT
            echo "IS_F001=false" >> $GITHUB_OUTPUT
          elif [[ "$REF" == refs/tags/f001-validate* ]]; then
            echo "VERSION=${REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "MAJOR=0" >> $GITHUB_OUTPUT
            echo "IS_F001=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: Cache Android NDK
        id: ndk-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/android-ndk-${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}-linux-${{ env.NDK_SHA256 }}

      - name: Download and verify Android NDK r26b
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          NDK_URL="https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
          curl -fsSL "$NDK_URL" -o ndk.zip
          ACTUAL_SHA256=$(sha256sum ndk.zip | cut -d' ' -f1)
          if [ "$ACTUAL_SHA256" != "$NDK_SHA256" ]; then
            echo "FATAL: NDK checksum mismatch!"
            exit 1
          fi
          unzip -q ndk.zip -d $HOME
          rm -f ndk.zip

      - name: Set NDK environment
        run: echo "NDK_HOME=$HOME/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Configure cross-compilation env
        run: |
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=${TOOLCHAIN}/llvm-ar" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "CMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake" >> $GITHUB_ENV

      - name: Build release binaries
        run: |
          cargo build --release -p aura-daemon --target aarch64-linux-android
          cargo build --release -p aura-neocortex --target aarch64-linux-android

      - name: Generate checksums
        run: |
          sha256sum target/aarch64-linux-android/release/aura-daemon > aura-daemon.sha256
          sha256sum target/aarch64-linux-android/release/aura-neocortex > aura-neocortex.sha256

      - name: Set release name
        id: release-name
        run: |
          if [[ "${{ steps.version.outputs.IS_F001 }}" == "true" ]]; then
            echo "name=AURA F001 Validation Build" >> $GITHUB_OUTPUT
          else
            echo "name=AURA v${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.release-name.outputs.name }}
          draft: false
          prerelease: true
          body: |
            ## F001 Real Device Validation Build

            Binary with F001 fix applied: `lto="thin"`, `panic="unwind"`, `_flag` compilation error resolved.

            Built from commit `554ef61746175556284cab2141e53cb01e5aaf8d` on branch `fix/f001-panic-ndk-rootfix`.

            ### Verification
            ```sh
            sha256sum -c aura-daemon.sha256
            sha256sum -c aura-neocortex.sha256
            ```
          files: |
            target/aarch64-linux-android/release/aura-daemon
            target/aarch64-linux-android/release/aura-neocortex
            aura-daemon.sha256
            aura-neocortex.sha256
          generate_release_notes: false
