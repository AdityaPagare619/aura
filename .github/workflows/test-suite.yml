# ============================================================
# AURA v4 — Automated Test Suite
# Unit tests, integration tests, doc tests, coverage
#
# Features: --features stub for host builds
# Parallel execution where possible
# Coverage: tarpaulin (Linux), grcov (cross-platform)
# ============================================================

name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-suite-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: full

jobs:
  # ============================================================
  # UNIT TESTS — All workspace crates
  # ============================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: unit-tests

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libopus-dev

      - name: Run unit tests
        run: cargo test --workspace --features "aura-llama-sys/stub,aura-daemon/reqwest" -- --nocapture
        env:
          RUST_LOG: debug
          RUST_TEST_THREADS: 4

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            target/debug/test-*.log
          retention-days: 14

  # ============================================================
  # INTEGRATION TESTS — Test binaries matching 'test*'
  # ============================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: integration-tests

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libopus-dev

      - name: Run integration tests
        run: |
          cargo test --test '*' --workspace --features "aura-llama-sys/stub,aura-daemon/reqwest" -- --nocapture || \
          echo "No integration test binaries found or tests passed"
        env:
          RUST_LOG: debug

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            target/debug/test-*.log
          retention-days: 14

  # ============================================================
  # DOC TESTS — Rustdoc examples
  # ============================================================
  doc-tests:
    name: Doc Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: doc-tests

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libopus-dev

      - name: Run doc tests
        run: cargo test --doc --workspace --features "aura-llama-sys/stub,aura-daemon/reqwest"
        env:
          RUST_LOG: debug

      - name: Upload doc test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doc-test-results
          path: |
            target/debug/test-*.log
          retention-days: 14

  # ============================================================
  # PER-CRATE TESTS — Parallel test jobs per crate
  # ============================================================
  crate-tests:
    name: Test ${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - aura-types
          - aura-daemon
          - aura-neocortex
          - aura-llama-sys
          - aura-iron-laws
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: crate-${{ matrix.crate }}

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libopus-dev

      - name: Run crate tests
        run: |
          cargo test -p ${{ matrix.crate }} --features "aura-llama-sys/stub,aura-daemon/reqwest" -- --nocapture
        env:
          RUST_LOG: debug

      - name: Upload crate test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crate-test-${{ matrix.crate }}
          path: |
            target/debug/test-*.log
          retention-days: 14

  # ============================================================
  # COVERAGE — tarpaulin (Linux only)
  # ============================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: coverage

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libopus-dev libssl-dev

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Run tarpaulin coverage
        run: |
          cargo tarpaulin \
            --workspace \
            --features "aura-llama-sys/stub,aura-daemon/reqwest" \
            --out xml \
            --out html \
            --output-dir coverage \
            --timeout 300 \
            --skip-clean \
            -- --nocapture
        env:
          RUST_LOG: debug

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/tarpaulin-report.html
            coverage/cobertura.xml
          retention-days: 30

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/cobertura.xml ]; then
            echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "Coverage report generated in artifacts." >> $GITHUB_STEP_SUMMARY
          fi
