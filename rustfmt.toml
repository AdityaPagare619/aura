# rustfmt configuration for AURA v4
# STABLE-compatible options only (CI uses stable Rust)
# Applied by: cargo fmt --check (CI) and cargo fmt (local)

edition = "2021"

# ── Line width ──────────────────────────────────────────────────────────────
max_width = 100

# ── Imports ──────────────────────────────────────────────────────────────────
reorder_imports = true
reorder_modules = true

# ── Trailing commas ───────────────────────────────────────────────────────────

# ── Braces and blocks ─────────────────────────────────────────────────────────
# NOTE: Unstable options removed — CI uses stable Rust
# Re-enable these when migrating to nightly

# ── Match and arms ────────────────────────────────────────────────────────────
match_arm_leading_pipes = "Never"

# ── Functions ──────────────────────────────────────────────────────────────────
newline_style = "Unix"          # LF everywhere (matches .gitattributes)

# ── Structs and enums ─────────────────────────────────────────────────────────

# ── Strings ───────────────────────────────────────────────────────────────────

# ── Misc ──────────────────────────────────────────────────────────────────────
use_field_init_shorthand = true
use_try_shorthand = true
# NOTE: Unstable options removed — CI uses stable Rust
# condense_wildcard_suffixes = true
